<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>211_molite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a192f; color: #ccd6f6; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; padding: 20px; }
        .card { background: #112240; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(2,12,27,0.5); }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: #0a192f; color: white; border: 1px solid #233554; 
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        #thanks-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    background: #0a192f;
    opacity: 0;
    transition: opacity 2s;
    /* Кнопки будут нажиматься СКВОЗЬ этот блок */
    pointer-events: none; 
}
#thanks-screen.active {
    opacity: 1;
    pointer-events: auto; /* Начинает принимать клики */
}

#fireworks {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

        button { 
            width: 100%; padding: 12px; border: 1px solid #64ffda; 
            color: #64ffda; background: none; cursor: pointer; 
            font-weight: bold; border-radius: 6px; transition: 0.3s;
        }
        button:hover { background: rgba(100,255,218,0.1); }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { border-color: #8892b0; color: #8892b0; flex: 1; white-space: nowrap; min-width: 80px; }
        .tab-btn.active { border-color: #64ffda; color: #64ffda; background: rgba(100,255,218,0.05); }

        .post { background: #112240; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #64ffda; }
        .author-name { color: #64ffda; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .post-time { font-size: 0.75rem; color: #8892b0; margin-top: 10px; }
        #fireworks {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
        .admin-btn { border: 1px solid #f57d7d; color: #f57d7d; width: auto; padding: 4px 10px; font-size: 0.8rem; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #64ffda; text-align: center;">211_molite</h1>
    <div id="user-info" style="text-align: center; margin-bottom: 15px;"></div>




    <div id="auth-section" class="card">
        <h3>Вход / Регистрация</h3>
        <input type="text" id="user-name" placeholder="Имя (для новых)">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <div style="display: flex; gap: 10px;">
            <button id="login-btn">Войти</button>
            <button id="reg-btn" style="border-color: #8892b0; color: #8892b0;">Создать</button>
        </div>
    </div>

    <div id="admin-panel" class="card hidden">
        <h3>Новый пост</h3>
        <select id="post-category">
            <option value="news">Молитвы пред судным днём</option>
            <option value="private">Молитвы по судному дню</option>
            <option value="archive">Молитвы на каждый день</option>
        </select>
        <textarea id="post-text" rows="3" placeholder="Текст..."></textarea>
        <button id="send-btn">Опубликовать</button>
        
        <button id="logout-btn" style="border:none; color:#f57d7d; font-size: 0.8rem; margin-top: 10px;">Выйти</button>
    </div>

<button id="gift-btn" style="width: auto; position: absolute; top: 20px; right: 20px; font-size: 1.5rem; border: none; background:none; cursor:pointer;">🎁</button>

<div id="thanks-screen" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; background: #0a192f; opacity: 0; transition: opacity 2s;">
    <canvas id="fireworks" style="position: absolute; top: 0; left: 0;"></canvas>
    <h1 style="color: #64ffda; font-size: 3rem; text-shadow: 0 0 20px #64ffda; z-index: 10;">Спасибо тебе!</h1>
    <p style="color: #ccd6f6; z-index: 10;">За то что всегда поддерживал меня и мои глупые идеи
За то что всегда утешал меня если ктото меня сильно обидил
За то что уделял мне время всегда на игры,покатушки,общение
      За всё это я тебе хочу сказать спасибо♥︎♥︎♥︎</p>
</div>

    <div class="tabs">
        <button id="btn-news" class="tab-btn active" onclick="switchTab('news')">Молитвы <br>пред судным днём</button>
        <button id="btn-private" class="tab-btn" onclick="switchTab('private')">Молитвы <br>по судному дню</button>
        <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">Молитвы<br> на каждый день</button>
    </div>

    <div id="posts-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwM_poO1R-3JM5DScKOrRHeXinAxQzYjA",
        authDomain: "slava211-66690.firebaseapp.com",
        projectId: "slava211-66690",
        storageBucket: "slava211-66690.firebasestorage.app",
        messagingSenderId: "948890609520",
        appId: "1:948890609520:web:1fb7e20e939b7040e211b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAILS = ["malyareinkko162@yandex.ru", "artemochka"]; 
    let currentTab = 'news';
    let unsubscribe = null;

    // --- АВТОРИЗАЦИЯ ---
    document.getElementById('reg-btn').onclick = async () => {
        const name = document.getElementById('user-name').value.trim();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", res.user.uid), { name, email });
        } catch(e) { alert(e.message); }
    };

    document.getElementById('login-btn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('pass').value).catch(e => alert(e.message));
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        const isAdmin = user && ADMIN_EMAILS.includes(user.email);
        document.getElementById('auth-section').classList.toggle('hidden', !!user);
        document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            document.getElementById('user-info').innerHTML = `Привет, <b>${userDoc.exists() ? userDoc.data().name : "Друг"}</b>`;
        }
        loadPosts();
    });

    // --- РАБОТА С ПОСТАМИ ---
    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('post-text').value.trim();
        const category = document.getElementById('post-category').value;
        if(!text) return;
        const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
        await addDoc(collection(db, "posts"), {
            content: text, author: userDoc.data().name, category, time: serverTimestamp()
        });
        document.getElementById('post-text').value = "";
    };

    window.switchTab = (tab) => {
        currentTab = tab;
        // Список всех твоих ID категорий (должны совпадать с ID кнопок в HTML: btn-news и т.д.)
        ['news', 'private', 'archive'].forEach(t => {
            const btn = document.getElementById('btn-' + t);
            if(btn) btn.classList.toggle('active', t === tab);
        });
        loadPosts();
    };

    function loadPosts() {
        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "posts"), where("category", "==", currentTab), orderBy("time", "desc"));
        unsubscribe = onSnapshot(q, (snap) => {
            const cont = document.getElementById('posts-container');
            cont.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const isAdmin = auth.currentUser && ADMIN_EMAILS.includes(auth.currentUser.email);
                cont.innerHTML += `<div class="post">
                    <div class="author-name">${p.author}</div>
                    <div style="white-space: pre-wrap;">${p.content}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="post-time">${p.time ? p.time.toDate().toLocaleString() : "..."}</span>
                        ${isAdmin ? `<button class="admin-btn" onclick="deletePost('${docSnap.id}')">Удалить</button>` : ""}
                    </div>
                </div>`;
            });
        }, (error) => {
            console.error("Ошибка загрузки. Возможно, строится индекс:", error);
        });
    }

    window.deletePost = (id) => { if(confirm("Удалить?")) deleteDoc(doc(db, "posts", id)); };

    // --- ЛОГИКА ПОЗДРАВЛЕНИЯ (ФЕЙЕРВЕРКИ) ---
    window.startFireworks = function() {
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: vx, y: vy };
                this.alpha = 1; this.friction = 0.96;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.008;
            }
        }

        function spawnHeart() {
            const centerX = Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1);
            const centerY = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.2);
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            for (let i = 0; i < 100; i++) {
                const angle = (i / 100) * Math.PI * 2;
                const vx = 16 * Math.pow(Math.sin(angle), 3);
                const vy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                particles.push(new Particle(centerX, centerY, color, vx * 0.5, vy * 0.5));
            }
        }

        setInterval(spawnHeart, 1200);

        function animate() {
            ctx.fillStyle = 'rgba(10, 25, 47, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else { p.update(); p.draw(); }
            });
            requestAnimationFrame(animate);
        }
        animate();
    };

document.getElementById('gift-btn').onclick = () => {
    console.log("Запуск финальной версии...");

    // 1. Создаем оверлей
    const overlay = document.createElement('div');
    overlay.id = 'final-overlay';
    Object.assign(overlay.style, {
        position: 'fixed',
        top: '0', left: '0',
        width: '100vw', height: '100vh',
        backgroundColor: '#0a192f',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'center',
        alignItems: 'center',
        zIndex: '2147483647',
        color: 'white',
        margin: '0', padding: '0',
        transition: 'opacity 1s ease'
    });

    // 2. Добавляем контент (Canvas + Текст)
    overlay.innerHTML = `
        <canvas id="fireworks-final" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
        <h1 style="font-size: 50px; color: #64ffda; text-shadow: 0 0 20px #64ffda; z-index: 10;  font-family: sans-serif;">Спасибо тебе!</h1>
        <p style="font-size: 20px; color: #ccd6f6; z-index: 10; font-family: sans-serif; text-align: center; margin-top: 15px;">За то что всегда поддерживал меня и мои глупые идеи<br>
За то что всегда утешал меня если ктото меня сильно обидил <br>
За то что уделял мне время всегда на игры,покатушки,общение <br>
      За всё это я тебе хочу сказать спасибо♥︎♥︎♥︎</p>
        <button onclick="location.reload()" style="position: relative; z-index: 11; margin-top: 30px; background: none; border: 1px solid #64ffda; color: #64ffda; padding: 10px 20px; cursor: pointer;">Назад</button>
    `;

    document.body.appendChild(overlay);

    // 3. Функция салюта специально для этого нового Canvas
    const canvas = document.getElementById('fireworks-final');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    class HeartParticle {
        constructor(x, y, color, vx, vy) {
            this.x = x; this.y = y; this.color = color;
            this.velocity = { x: vx, y: vy };
            this.alpha = 1; this.friction = 0.96;
        }
        draw() {
            ctx.save(); ctx.globalAlpha = this.alpha;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
        }
        update() {
            this.velocity.x *= this.friction; this.velocity.y *= this.friction;
            this.x += this.velocity.x; this.y += this.velocity.y;
            this.alpha -= 0.01;
        }
    }

    function spawn() {
        const cx = Math.random() * canvas.width;
        const cy = Math.random() * canvas.height * 0.5;
        const col = `hsl(${Math.random() * 360}, 100%, 60%)`;
        for (let i = 0; i < 100; i++) {
            const angle = (i / 100) * Math.PI * 2;
            const vx = 16 * Math.pow(Math.sin(angle), 3);
            const vy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
            particles.push(new HeartParticle(cx, cy, col, vx * 0.5, vy * 0.5));
        }
    }

    const timer = setInterval(spawn, 1000);

    function run() {
        ctx.fillStyle = 'rgba(10, 25, 47, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            if (p.alpha <= 0) particles.splice(i, 1);
            else { p.update(); p.draw(); }
        });
        requestAnimationFrame(run);
    }
    
    run();
};
</script>
</body>
</html>
