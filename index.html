<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>211_molite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a192f; color: #ccd6f6; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 600px; padding: 20px; }
        .card { background: #112240; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(2,12,27,0.5); }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #0a192f; color: white; border: 1px solid #233554; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: 1px solid #64ffda; color: #64ffda; background: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: rgba(100,255,218,0.1); }
        .post { background: #112240; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #64ffda; position: relative; }
        .author-name { color: #64ffda; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .post-time { font-size: 0.7rem; color: #8892b0; margin-top: 10px; }
        .hidden { display: none; }
        .admin-btn { border-color: #f57d7d; color: #f57d7d; margin-top: 5px; width: auto; font-size: 0.8rem; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #64ffda; text-align: center;">211_molite</h1>
    
    <div id="auth-section" class="card">
        <h3>Вход или Регистрация</h3>
        <input type="text" id="user-name" placeholder="Твое Имя (для регистрации)">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <div style="display: flex; gap: 10px;">
            <button id="login-btn">Войти</button>
            <button id="reg-btn">Создать аккаунт</button>
        </div>
    </div>

    <div id="user-panel" class="card hidden">
        <div id="welcome-msg" style="margin-bottom: 10px;"></div>
        <textarea id="post-text" placeholder="Что нового?"></textarea>
        <button id="send-btn">Опубликовать пост</button>
        <button id="logout-btn" style="border:none; color:#8892b0; font-size: 0.8rem;">Выйти</button>
        
        <div id="admin-tools" class="hidden" style="margin-top: 20px; border-top: 1px solid #233554; padding-top: 10px;">
            <h4 style="color: #f57d7d;">Управление пользователями</h4>
            <div id="users-list"></div>
        </div>
    </div>

    <div id="posts"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwM_poO1R-3JM5DScKOrRHeXinAxQzYjA",
        authDomain: "slava211-66690.firebaseapp.com",
        projectId: "slava211-66690",
        storageBucket: "slava211-66690.firebasestorage.app",
        messagingSenderId: "948890609520",
        appId: "1:948890609520:web:1fb7e20e939b7040e211b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Список админов
// Добавляй сюда любые почты через запятую в кавычках
const ADMIN_EMAILS = [
    "malyareinkko162@yandex.ru", 
    "artemuchoka" 
];
    // --- РЕГИСТРАЦИЯ ---
    document.getElementById('reg-btn').onclick = async () => {
        const name = document.getElementById('user-name').value.trim();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();

        if (!name || !email || pass.length < 6) {
            return alert("Заполни все поля! Пароль минимум 6 символов.");
        }

        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            // Сразу создаем запись в базе
            await setDoc(doc(db, "users", res.user.uid), {
                name: name,
                email: email,
                role: ADMIN_EMAILS.includes(email) ? "admin" : "user"
            });
            alert("Аккаунт создан!");
        } catch (e) {
            if (e.code === 'auth/email-already-in-use') alert("Эта почта уже занята!");
            else alert("Ошибка: " + e.message);
        }
    };

    // --- ВХОД ---
    document.getElementById('login-btn').onclick = () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Ошибка входа: " + e.message));
    };

    // --- ВЫХОД ---
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    // --- МОНИТОРИНГ СОСТОЯНИЯ ---
    onAuthStateChanged(auth, async (user) => {
        const authSec = document.getElementById('auth-section');
        const userPan = document.getElementById('user-panel');
        const adminTools = document.getElementById('admin-tools');

        if (user) {
            authSec.classList.add('hidden');
            userPan.classList.remove('hidden');
            
            // Получаем имя из базы
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const name = userDoc.exists() ? userDoc.data().name : "Пользователь";
            document.getElementById('welcome-msg').innerHTML = `Привет, <b>${name}</b>!`;

            if (ADMIN_EMAILS.includes(user.email)) {
                adminTools.classList.remove('hidden');
            }
        } else {
            authSec.classList.remove('hidden');
            userPan.classList.add('hidden');
            adminTools.classList.add('hidden');
        }
    });

    // --- ОТПРАВКА ПОСТА ---
    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('post-text').value.trim();
        if (!text || !auth.currentUser) return;

        try {
            const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
            const authorName = userDoc.exists() ? userDoc.data().name : "Аноним";

            await addDoc(collection(db, "posts"), {
                content: text,
                author: authorName,
                time: serverTimestamp()
            });
            document.getElementById('post-text').value = "";
        } catch (e) { alert("Ошибка при публикации!"); }
    };

    // --- ЛЕНТА ПОСТОВ ---
    onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
        const cont = document.getElementById('posts');
        cont.innerHTML = "";
        snap.forEach(s => {
            const p = s.data();
            const isAdmin = auth.currentUser && ADMIN_EMAILS.includes(auth.currentUser.email);
            const date = p.time ? p.time.toDate().toLocaleString() : "...";
            cont.innerHTML += `
                <div class="post">
                    <div class="author-name">${p.author}</div>
                    <div>${p.content}</div>
                    <div class="post-time">${date}</div>
                    ${isAdmin ? `<button class="admin-btn" onclick="deletePost('${s.id}')">Удалить</button>` : ""}
                </div>`;
        });
    });

    window.deletePost = (id) => { if(confirm("Удалить пост?")) deleteDoc(doc(db, "posts", id)); };
</script>
</body>
</html>
